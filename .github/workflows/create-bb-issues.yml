name: Создать задачи BeautyBook MVP

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Создать метки
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'фаза-1-фундамент', color: '1D76DB', description: 'Layout, i18n, auth, базовая инфраструктура' },
              { name: 'фаза-2-витрина', color: '0E8A16', description: 'Публичный профиль мастера' },
              { name: 'фаза-3-услуги', color: '5319E7', description: 'CRUD услуг мастера' },
              { name: 'фаза-4-оплата', color: 'FBCA04', description: 'Методы оплаты мастера' },
              { name: 'фаза-5-бронирование', color: 'D93F0B', description: 'Календарь и бронирование' },
              { name: 'фаза-6-чекаут', color: 'C2E0C6', description: 'Быстрый чекаут (завершение сеанса)' },
              { name: 'фаза-7-дашборд', color: 'BFD4F2', description: 'Личный кабинет мастера' },
              { name: 'фаза-8-портфолио', color: 'D4C5F9', description: 'Загрузка и отображение портфолио' },
              { name: 'фаза-9-клиент', color: 'F9D0C4', description: 'Клиентская часть' },
              { name: 'фаза-10-каталог', color: 'C5DEF5', description: 'Каталог и поиск мастеров' },
              { name: 'фаза-11-отзывы', color: 'FEF2C0', description: 'Отзывы и рейтинги' },
              { name: 'фаза-12-аналитика', color: 'E99695', description: 'Аналитика мастера' },
              { name: 'фаза-13-telegram', color: '0088CC', description: 'Telegram Mini App + Bot' },
              { name: 'фаза-14-уведомления', color: 'EDEDED', description: 'Email и Telegram уведомления' },
              { name: 'фаза-15-админ', color: 'B60205', description: 'Админ-панель' },
              { name: 'фаза-16-qa', color: '006B75', description: 'QA, полировка, деплой' },
              { name: 'frontend', color: '61DAFB', description: 'Фронтенд задача' },
              { name: 'backend', color: '68D391', description: 'Бэкенд / API задача' },
              { name: 'design', color: 'F472B6', description: 'Связано с дизайном (см. DESIGN_SPEC.md)' },
              { name: 'i18n', color: 'A78BFA', description: 'Мультиязычность (ru/ky)' },
              { name: 'telegram', color: '0088CC', description: 'Telegram интеграция' },
              { name: 'blocker', color: 'B60205', description: 'Блокирует другие задачи' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                console.log(`✅ Метка создана: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  console.log(`⚠️ Метка уже существует: ${label.name}`);
                } else {
                  console.error(`❌ Ошибка: ${label.name}: ${e.message}`);
                }
              }
            }

      - name: Создать задачи
        uses: actions/github-script@v7
        with:
          script: |
            const issues = [

              // ============================================================
              // ФАЗА 1 — ФУНДАМЕНТ (Layout, i18n, Auth)
              // ============================================================

              {
                title: '[Фаза 1.1] Мультиязычность (i18n) — русский и кыргызский',
                labels: ['фаза-1-фундамент', 'frontend', 'i18n', 'blocker'],
                body: `## Цель
            Настроить систему мультиязычности для двух языков: русский (основной) и кыргызский.

            ## Зависимости
            Нет — это первая задача, от неё зависят все UI-задачи.

            ## Задачи
            - [ ] Установить и настроить \`@nuxtjs/i18n\` в \`nuxt.config.ts\`
            - [ ] Создать файлы переводов: \`app/locales/ru.json\`, \`app/locales/ky.json\`
            - [ ] Настроить стратегию: \`prefix_except_default\` (русский без префикса, кыргызский с \`/ky/\`)
            - [ ] Создать базовую структуру переводов: навигация, общие UI-элементы (кнопки, статусы, ошибки)
            - [ ] Добавить composable \`useLocale()\` или использовать \`useI18n()\` для переключения языка
            - [ ] Добавить переключатель языка в header (простой dropdown: «Русский» / «Кыргызча»)
            - [ ] Убедиться, что Nuxt UI компоненты получают переведённые строки

            ## Структура файлов переводов
            \`\`\`
            app/locales/
              ru.json  — русский (основной)
              ky.json  — кыргызский
            \`\`\`

            ## Принцип
            Все строки в UI должны идти через \`$t('key')\` или \`t('key')\`. Никаких хардкод-строк на страницах и компонентах.

            ## Оценка
            1 день`,
              },

              {
                title: '[Фаза 1.2] Базовый layout — AppHeader и AppFooter',
                labels: ['фаза-1-фундамент', 'frontend', 'design'],
                body: `## Цель
            Реализовать компоненты AppHeader и AppFooter, задать каркас приложения.

            ## Зависимости
            - Зависит от: **Фаза 1.1** (i18n — строки навигации должны быть переведены)

            ## Задачи
            - [ ] Реализовать \`app/components/ui/AppHeader.vue\`:
              - Логотип «BeautyBook» (serif шрифт Cormorant Garamond, font-light)
              - Навигация: ссылки на каталог, «Для мастеров», «Войти»
              - Для авторизованных: аватар + dropdown (профиль, настройки, выход)
              - Переключатель языка (ru/ky)
              - Мобильный burger-меню
            - [ ] Реализовать \`app/components/ui/AppFooter.vue\`:
              - Ссылки: О нас, Контакты, Для мастеров
              - Копирайт
            - [ ] Реализовать bottom navigation bar для мобильной версии (видим только на \`md:\` и ниже):
              - Иконки: Главная, Каталог, Записи, Профиль (максимум 4-5 пунктов)
              - Sticky bottom, \`pb-safe\` для iOS
            - [ ] Обновить \`app/app.vue\` — подключить header/footer

            ## Дизайн (DESIGN_SPEC.md)
            - Навигация: \`font-sans (Plus Jakarta Sans)\`, \`font-medium\`, sentence case
            - Логотип: \`font-serif (Cormorant Garamond)\`, \`font-light\`
            - Bottom nav: \`fixed bottom-0\`, \`bg-default\`, \`border-t border-default\`, \`pb-safe\`
            - Иконки навигации: 24px, outline style (Heroicons)
            - Touch targets: минимум 44×44px
            - Фон страницы: \`#FAF8F5\` (светлая тема) — не чисто белый

            ## Оценка
            1 день`,
              },

              {
                title: '[Фаза 1.3] Clerk — страницы авторизации и выбор роли',
                labels: ['фаза-1-фундамент', 'frontend', 'backend', 'blocker'],
                body: `## Цель
            Полностью настроить авторизацию через Clerk: страницы входа, регистрации, выбор роли при первом входе, синхронизация с Supabase.

            ## Зависимости
            - Зависит от: **Фаза 1.2** (layout — header должен отображать состояние авторизации)

            ## Задачи
            - [ ] Создать страницу \`app/pages/sign-in.vue\` с Clerk SignIn компонентом
            - [ ] Создать страницу \`app/pages/sign-up.vue\` с Clerk SignUp компонентом
            - [ ] Создать страницу \`app/pages/onboarding.vue\` — выбор роли (мастер / клиент):
              - Две карточки с иконками и описанием
              - При выборе «Мастер» — перенаправление на заполнение профиля мастера
              - При выборе «Клиент» — перенаправление на главную
            - [ ] Создать серверный API endpoint для Clerk webhook (\`server/api/webhooks/clerk.post.ts\`):
              - Обработка события \`user.created\` — создание записи в таблице \`profiles\`
              - Обработка события \`user.updated\` — обновление \`profiles\`
            - [ ] Обновить middleware \`auth.ts\` — если пользователь не выбрал роль, редиректить на \`/onboarding\`
            - [ ] Обновить AppHeader — показывать аватар + имя для авторизованных, «Войти» для гостей
            - [ ] Стилизовать Clerk компоненты под дизайн-систему (Clerk appearance config)

            ## Дизайн (DESIGN_SPEC.md)
            - Страницы auth: центрированная карточка, \`rounded-2xl\`, мягкая тень
            - Фон страницы: \`#FAF8F5\`
            - Кнопки: \`color="primary"\`, \`size="lg"\`, \`w-full\` на мобиле
            - Карточки выбора роли: \`rounded-2xl\`, hover-эффект (подъём на 2px), border при выбранном состоянии

            ## Оценка
            1.5 дня`,
              },

              {
                title: '[Фаза 1.4] Утилита generateSlots — генерация временных слотов',
                labels: ['фаза-1-фундамент', 'backend', 'blocker'],
                body: `## Цель
            Реализовать серверную утилиту для генерации доступных слотов бронирования на основе графика работы мастера и существующих записей.

            ## Зависимости
            Нет — чистая утилита, но от неё зависит **Фаза 5** (бронирование).

            ## Задачи
            - [ ] Создать \`server/utils/slots.ts\` с функцией \`generateSlots(workHours, existingBookings, date, serviceDuration)\`
            - [ ] Логика:
              1. Получить рабочие часы мастера на конкретный день недели из \`work_hours\` JSON
              2. Нарезать рабочий период на слоты по \`serviceDuration\` минут (шаг 30 мин)
              3. Отфильтровать слоты, пересекающиеся с существующими бронированиями (status != cancelled)
              4. Вернуть массив \`{ start: string, end: string, available: boolean }\`
            - [ ] Обновить \`server/api/masters/[id]/slots.get.ts\` — подключить \`generateSlots\`
            - [ ] Учитывать буферное время между записями (опционально, 10 мин по умолчанию)

            ## Оценка
            0.5 дня`,
              },

              {
                title: '[Фаза 1.5] Серверные composables — useServerSupabase и useServerAuth',
                labels: ['фаза-1-фундамент', 'backend', 'blocker'],
                body: `## Цель
            Убедиться, что серверные утилиты для работы с Supabase и Clerk корректно настроены и переиспользуемы.

            ## Зависимости
            - Зависит от: **Фаза 1.3** (Clerk должен быть настроен)

            ## Задачи
            - [ ] Проверить и доработать \`server/utils/supabase.ts\` — \`useServerSupabase()\` с service role key
            - [ ] Создать \`server/utils/auth.ts\` — \`requireAuth(event)\` (возвращает userId или бросает 401)
            - [ ] Создать \`server/utils/requireMaster(event)\` — проверяет auth + role === 'master', возвращает profile
            - [ ] Обновить все существующие API routes, чтобы использовали эти утилиты единообразно

            ## Оценка
            0.5 дня`,
              },

              // ============================================================
              // ФАЗА 2 — ПУБЛИЧНАЯ ВИТРИНА МАСТЕРА
              // ============================================================

              {
                title: '[Фаза 2.1] Страница профиля мастера — hero и структура табов',
                labels: ['фаза-2-витрина', 'frontend', 'design'],
                body: `## Цель
            Реализовать публичную страницу профиля мастера \`/master/[username]\` с hero-секцией и табами.

            ## Зависимости
            - Зависит от: **Фаза 1.2** (layout), **Фаза 1.1** (i18n)
            - API \`GET /api/masters/[username]\` уже реализован

            ## Задачи
            - [ ] Реализовать \`app/pages/master/[username].vue\`:
              - Hero-секция: cover photo (16:9, max-height 240px mobile / 360px desktop)
              - Аватар: circular, 80px mobile / 96px desktop, перекрывает нижний край cover
              - Имя мастера: Cormorant Garamond, text-3xl, font-light
              - Специализация: Plus Jakarta Sans, text-base, text-muted
              - Город: с иконкой \`i-heroicons-map-pin\`
              - Рейтинг: звезда + число + количество отзывов
              - Sticky кнопка «Записаться» — всегда видна при скролле
            - [ ] Реализовать \`app/components/master/MasterProfile.vue\` — переиспользуемый компонент профиля
            - [ ] Табы (UTabs, underline style):
              1. Услуги — список услуг с ценами и длительностью
              2. Портфолио — сетка фотографий (3 колонки)
              3. Отзывы — список отзывов
              4. О мастере — bio + контакты
            - [ ] SSR рендеринг для SEO: мета-теги (title, description, og:image)
            - [ ] Skeleton loading state при загрузке данных

            ## Дизайн (DESIGN_SPEC.md)
            - Cover photo: \`aspect-video\` или фиксированная высота, \`object-cover\`
            - Аватар: \`UAvatar size="xl"\`, \`ring-2 ring-default\`
            - Карточка услуги: \`UCard rounded-xl p-4\`, flex layout с ценой справа
            - Цена: \`font-sans font-semibold text-lg text-primary-600\`
            - Длительность: \`text-sm text-muted\` с иконкой \`i-heroicons-clock\`
            - Sticky CTA: \`fixed bottom-0\` на мобиле, \`shadow-lg\`, \`pb-safe\`
            - Табы: \`UTabs\` с \`border-b border-default\`, активный таб — \`border-primary-500\`
            - Сигналы доверия: бейджи «X записей», verified badge

            ## Оценка
            2 дня`,
              },

              {
                title: '[Фаза 2.2] Компонент MasterCard — карточка мастера для листингов',
                labels: ['фаза-2-витрина', 'frontend', 'design'],
                body: `## Цель
            Реализовать карточку мастера для использования в каталоге и на главной странице.

            ## Зависимости
            - Зависит от: **Фаза 1.1** (i18n)

            ## Задачи
            - [ ] Реализовать \`app/components/master/MasterCard.vue\`:
              - Props: master object (name, avatar, cover, specialty, rating, reviewCount, priceFrom, city)
              - Фото 4:5 (портретное), занимает 60-65% высоты карточки
              - Имя + специальность под фото
              - Рейтинг + количество отзывов (бейдж)
              - Цена «от X сом»
              - Hover: подъём карточки на 2px + shadow-md
              - Click: переход на \`/master/[username]\`

            ## Дизайн (DESIGN_SPEC.md)
            - \`UCard\` с \`rounded-2xl overflow-hidden cursor-pointer\`
            - Фото: \`aspect-[4/5] overflow-hidden\`, \`object-cover\`
            - Имя: \`font-sans font-semibold text-base text-highlighted\`
            - Специальность: \`font-sans text-sm text-muted\`
            - Цена: \`text-sm font-semibold text-primary-600\`
            - Рейтинг: \`UBadge color="neutral" variant="soft" size="xs"\`
            - Hover: \`hover:shadow-md transition-shadow duration-200\`, \`transform translateY(-2px)\`
            - Touch targets: вся карточка кликабельна

            ## Оценка
            0.5 дня`,
              },

              // ============================================================
              // ФАЗА 3 — УПРАВЛЕНИЕ УСЛУГАМИ
              // ============================================================

              {
                title: '[Фаза 3.1] Страница управления услугами (CRUD)',
                labels: ['фаза-3-услуги', 'frontend', 'backend', 'design'],
                body: `## Цель
            Реализовать страницу \`/dashboard/services\` с полным CRUD для услуг мастера.

            ## Зависимости
            - Зависит от: **Фаза 1.3** (auth + middleware), **Фаза 1.1** (i18n)
            - API endpoints \`GET/POST/PATCH /api/master/services\` уже реализованы

            ## Задачи
            - [ ] Реализовать \`app/pages/dashboard/services.vue\`:
              - Список услуг мастера (карточки)
              - Кнопка «Добавить услугу» (\`i-heroicons-plus\`)
              - Каждая услуга: название, описание, цена, длительность, статус (active/inactive)
              - Действия: редактировать, деактивировать, удалить
            - [ ] Создать компонент формы услуги (модальное окно или drawer):
              - Поля: название (text), описание (textarea), цена (number, inputmode="decimal"), длительность (select: 15/30/45/60/90/120 мин)
              - Zod-схема валидации: название обязательно, цена > 0, длительность > 0
              - VeeValidate интеграция с \`useForm\`
            - [ ] Добавить API endpoint \`DELETE /api/master/services/[id]\` (soft delete — \`is_active = false\`)
            - [ ] Empty state: иллюстрация + текст «У вас ещё нет услуг» + CTA «Добавить первую услугу»
            - [ ] Toast уведомления при создании/обновлении/удалении

            ## Дизайн (DESIGN_SPEC.md)
            - Карточки услуг: \`UCard rounded-xl p-4\`, flex layout
            - Цена: \`font-semibold text-lg text-primary-600\`, справа
            - Длительность: \`text-sm text-muted\`, иконка \`i-heroicons-clock\`
            - Форма: \`UModal\` или \`UDrawer direction="bottom"\` на мобиле
            - Поля: \`size="lg"\` на мобиле, label всегда видим
            - CTA кнопка формы: \`color="primary" size="lg" w-full\`
            - Удаление: \`color="error"\`, с подтверждением через \`UModal\`
            - Деактивация: \`opacity-50\` на карточке, бейдж «Неактивна»

            ## Оценка
            1.5 дня`,
              },

              // ============================================================
              // ФАЗА 4 — МЕТОДЫ ОПЛАТЫ
              // ============================================================

              {
                title: '[Фаза 4.1] Настройка методов оплаты мастера',
                labels: ['фаза-4-оплата', 'frontend', 'design'],
                body: `## Цель
            Реализовать интерфейс управления методами оплаты в настройках мастера.

            ## Зависимости
            - Зависит от: **Фаза 1.3** (auth), **Фаза 1.1** (i18n)
            - API endpoints \`GET/POST/PATCH/DELETE /api/master/payment-types\` уже реализованы

            ## Задачи
            - [ ] Создать страницу \`app/pages/dashboard/settings.vue\` с секцией «Методы оплаты»
            - [ ] Список методов оплаты мастера (drag-and-drop для сортировки — опционально):
              - Название метода (текст)
              - Статус (active/inactive) — toggle
              - Кнопки: редактировать, удалить
            - [ ] Форма добавления/редактирования метода оплаты:
              - Поле: название (text) — «Наличные», «Kaspi», «Перевод на карту», «Mbank» и т.д.
              - Zod-валидация: название обязательно, уникальное среди методов мастера
            - [ ] Предустановленные варианты (подсказки): «Наличные», «Kaspi», «Mbank», «O!Деньги», «Перевод на карту»
            - [ ] Empty state: «Добавьте методы оплаты, чтобы использовать быстрый чекаут»

            ## Дизайн (DESIGN_SPEC.md)
            - Список: простые строки с иконкой + текст + toggle + иконка удаления
            - Добавление: inline форма внизу списка или \`UDrawer\`
            - Toggle: \`UToggle\` для is_active
            - Удаление: \`color="error" variant="ghost"\`, с подтверждением

            ## Оценка
            1 день`,
              },

              // ============================================================
              // ФАЗА 5 — БРОНИРОВАНИЕ
              // ============================================================

              {
                title: '[Фаза 5.1] Компонент BookingCalendar — обёртка над v-calendar',
                labels: ['фаза-5-бронирование', 'frontend', 'design'],
                body: `## Цель
            Реализовать компонент календаря для выбора даты бронирования, стилизованный под дизайн-систему.

            ## Зависимости
            - Зависит от: **Фаза 1.1** (i18n — дни недели и месяцы на двух языках)

            ## Задачи
            - [ ] Реализовать \`app/components/booking/BookingCalendar.vue\`:
              - Props: \`availableDates\`, \`unavailableDates\`, \`selectedDate\`, \`minDate\`
              - Emit: \`@select\` при выборе даты
              - Использовать \`<VCalendar>\` из \`@samk-dev/nuxt-vcalendar\`
              - CSS класс \`bb-calendar\` для кастомных переменных
              - Locale: русский или кыргызский в зависимости от текущего языка
            - [ ] Атрибуты для визуализации:
